name: CI Pipeline

on:
    pull_request:
        branches:
            - dev
            - master
    push:
        branches:
            - master

jobs:
    validate:
        name: Lint, Typecheck, and Test
        runs-on: ubuntu-latest

        steps:
            - name: 🛎️ Checkout repository
              uses: actions/checkout@v4

            - name: ⚙️ Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20" # LTS version
                  cache: "npm" # Speeds up runs by caching node_modules

            - name: 📦 Install dependencies
              run: npm ci

            - name: 🕵️ Typecheck
              run: npm run typecheck

            - name: 🧹 Check no direct console usage
              run: npm run check:no-console

            - name: 🧪 Run Jest tests
              run: npm test
